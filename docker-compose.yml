version: '3.8'

services:
  surrealdb:
    image: surrealdb/surrealdb:v2.2.1
    container_name: researchgraph-db
    user: root
    command: start --user root --pass root rocksdb:///data/surreal.db
    ports:
      - "18000:8000"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  surrealdb_data:
